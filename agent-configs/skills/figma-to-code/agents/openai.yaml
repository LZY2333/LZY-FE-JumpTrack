interface:
  display_name: "Figma to Code"
  short_description: "Implement and verify UI from Figma nodes"
  default_prompt: "Use $figma-to-code to implement and verify this Figma node in the current codebase."
dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server for design context, metadata, screenshots, and assets"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
policy:
  allow_implicit_invocation: true
